name: Website NSE Feed Monitor

on:
  workflow_dispatch:
  schedule:
    # Asia/Kolkata 09:00-14:00, every 35 minutes, expressed in UTC.
    # Runs at IST: 09:00, 09:35, 10:10, 10:45, 11:20, 11:55, 12:30, 13:05, 13:40, 14:00.
    - cron: "30 3 * * *"
    - cron: "5,40 4 * * *"
    - cron: "15,50 5 * * *"
    - cron: "25 6 * * *"
    - cron: "0,35 7 * * *"
    - cron: "10,30 8 * * *"

permissions:
  contents: write

concurrency:
  group: website-nse-feed-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run website monitor
        env:
          WEBSITE_URL: "https://sameer-local-azure.sameersaurabh.xyz"
          REPORT_TIMEZONE: "Asia/Kolkata"
          REPORT_DIR: "reports"
        run: npm run monitor

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-monitor-report-${{ github.run_id }}
          path: reports/
          if-no-files-found: error

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Add website monitor report"
            git push
          fi
