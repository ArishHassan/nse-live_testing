name: Website NSE Feed Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: website-nse-feed-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run website monitor
        env:
          WEBSITE_URL: "https://sameer-local-azure.sameersaurabh.xyz"
          REPORT_TIMEZONE: "Asia/Kolkata"
          REPORT_DIR: "reports"
        run: npm run monitor

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-monitor-report-${{ github.run_id }}
          path: reports/
          if-no-files-found: error

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Add website monitor report"
            git push
          fi
